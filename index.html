    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Fio & Alma Studio",
      "url": "https://fioealma.pt",
      "logo": "https://fioealma.pt/icons/icon-512.png",
      "description": "Loja online de produtos artesanais feitos à mão em Portugal. Crochê, cerâmica, bonecos e peças únicas.",
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite (SearchAction para Google Sitelinks Search Box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Fio & Alma Studio",
      "url": "https://fioealma.pt",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://fioealma.pt/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: LocalBusiness / OnlineStore -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "LocalBusiness",
          "@id": "https://fioealma.pt/#localbusiness",
          "name": "Fio & Alma Studio",
          "description": "Loja de artesanato feito a mao em Portugal com croche, ceramica, bordados e costura criativa.",
          "url": "https://fioealma.pt",
          "image": "https://fioealma.pt/icons/icon-512.png"
        },
        {
          "@type": "OnlineStore",
          "@id": "https://fioealma.pt/#onlinestore",
          "name": "Fio & Alma Studio",
          "description": "Loja online de artesanato para comprar produtos feitos a mao com qualidade.",
          "url": "https://fioealma.pt",
          "image": "https://fioealma.pt/icons/icon-512.png",
          "priceRange": "€€",
          "currenciesAccepted": "EUR",
          "paymentAccepted": "Credit Card, Debit Card, MBWay, Google Pay, PayPal",
          "openingHoursSpecification": {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
            "opens": "00:00",
            "closes": "23:59"
          },
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Produtos Artesanais",
            "itemListElement": [
              {
                "@type": "OfferCatalog",
                "name": "Croche Artesanal",
                "description": "Pecas em croche feitas a mao"
              },
              {
                "@type": "OfferCatalog",
                "name": "Ceramica Artesanal",
                "description": "Pecas de ceramica artesanal pintadas a mao"
              },
              {
                "@type": "OfferCatalog",
                "name": "Bordados Artesanais",
                "description": "Pecas com bordados feitos a mao"
              },
              {
                "@type": "OfferCatalog",
                "name": "Costura Criativa",
                "description": "Pecas de costura criativa com design artesanal"
              }
            ]
          }
        }
      ]
    }
    </script>
