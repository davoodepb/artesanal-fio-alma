<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E86A6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4546A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="needle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0C0C0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Needle body (diagonal) -->
  <line x1="140" y1="380" x2="360" y2="110" stroke="url(#needle)" stroke-width="18" stroke-linecap="round"/>
  <!-- Needle point -->
  <polygon points="360,110 380,90 370,100 355,115" fill="#E0E0E0"/>
  <line x1="360" y1="110" x2="385" y2="80" stroke="#D0D0D0" stroke-width="10" stroke-linecap="round"/>
  <!-- Needle eye (hole) -->
  <ellipse cx="155" cy="365" rx="10" ry="16" fill="none" stroke="#FAF7F2" stroke-width="5" transform="rotate(-52, 155, 365)"/>
  <!-- Thread coming from the eye - flowing curve -->
  <path d="M145,375 C110,410 90,390 70,420 C50,450 80,460 60,430 C40,400 100,440 80,460" 
        fill="none" stroke="#FAF7F2" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Thread wrapping decoratively -->
  <path d="M80,460 C100,470 120,450 110,470 C100,490 130,480 120,460" 
        fill="none" stroke="#FAF7F2" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
  <!-- Small sparkle near needle tip -->
  <circle cx="375" cy="90" r="4" fill="white" opacity="0.7"/>
  <circle cx="390" cy="75" r="3" fill="white" opacity="0.5"/>
</svg>
